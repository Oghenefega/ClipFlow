<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!--
  Reframe detection page (#164 Phase B) — runs in a dedicated hidden
  BrowserWindow (src/main/reframe-detect.js). This CSP is scoped to THIS
  page only; the main window's CSP (index.html) is intentionally untouched.
  blob: + wasm-unsafe-eval exist so the vendored MediaPipe bundle/wasm can
  load from preload-read bytes with zero network access.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' blob: 'wasm-unsafe-eval'; connect-src blob:; media-src file: blob:; base-uri 'none'; form-action 'none'">
<title>ClipFlow layout detection</title>
</head>
<body>
<script src="./detect-page.js"></script>
</body>
</html>
